name: wedding_frontend
description: Premium wedding invitation Flutter Web app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  intl: ^0.19.0
  http: ^1.2.2
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0
  flutter_animate: ^4.5.0
  audioplayers: ^6.0.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # All photos live under assets/images/. See assets/images/README.md for the
  # exact file names the app expects (niece.jpg, gallery/1.jpg … 8.jpg).
  assets:
    - assets/images/
    - assets/images/gallery/
    - assets/audio/wedding_song.mp3

